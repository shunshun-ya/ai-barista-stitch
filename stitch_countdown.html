<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Coffee Brew Countdown</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#d44211",
              "background-light": "#f8f6f6",
              "background-dark": "#221510",
            },
            fontFamily: {
              "display": ["Work Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer" data-icon="ArrowLeft">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Brewing Soon</h2>
</div>
<!-- Recipe Header (Secondary) -->
<div class="px-4 py-2 flex flex-col items-center">
<h4 class="text-primary text-sm font-bold leading-normal tracking-[0.015em] uppercase">V60 Drip Coffee</h4>
<p class="text-slate-600 dark:text-slate-400 text-sm font-normal">Ethiopia Yirgacheffe • 18g coffee</p>
</div>
<!-- Main Countdown Area -->
<div class="flex-1 flex flex-col items-center justify-center px-4">
<div class="relative flex items-center justify-center">
<!-- Background Pulse Effect (Static Representation) -->
<div class="absolute w-64 h-64 bg-primary/10 rounded-full animate-ping opacity-20"></div>
<div class="absolute w-48 h-48 bg-primary/20 rounded-full"></div>
<!-- Large High Visual Impact Number -->
<h1 class="text-primary text-[160px] font-bold leading-none select-none drop-shadow-sm">3</h1>
</div>
<p class="text-slate-900 dark:text-slate-100 text-xl font-medium pt-8 pb-2">Get ready to pour...</p>
<p class="text-slate-500 dark:text-slate-400 text-base">Make sure your kettle is at 94°C</p>
</div>
<!-- Next Stage Preview Card -->
<div class="p-6">
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl shadow-sm border border-primary/10">
<div class="flex items-stretch justify-between gap-4">
<div class="flex flex-col gap-1 flex-[2_2_0px]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">schedule</span>
<p class="text-primary text-xs font-bold leading-normal tracking-wider uppercase">Up Next</p>
</div>
<p class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Bloom Stage</p>
<p class="text-slate-600 dark:text-slate-400 text-sm font-normal">Gently saturate with 50g water • 30s</p>
</div>
<div class="w-32 h-20 bg-center bg-no-repeat bg-cover rounded-lg overflow-hidden shrink-0" data-alt="Close up of coffee blooming in V60" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBRY9mn6qbuTqPXidnvMKWs8iWauSIpA_txqJ-iukD70bdyuhsH3tPm1eHNSesRvq54Z07h3YgDg1JXtITVNNwDR6_dqGg8lvigm0lZKiknazTBdjcQ9ncbB6uwwbnobGniFHZXxR12FoZIz8d1oOIDYuC4wO2pReJ6auN8D_fSuk193u1iKB5lWflx9lElUx19ZmFgLaRub4Ku4yf6hF60c-NdzK2T0qEqJI5zDnyQKAhTcvaqMhmWhTWX3Hjz9EelcDVHLiVavWzl");'>
</div>
</div>
</div>
</div>
<!-- Progress/Action Footer -->
<div class="p-6 pt-0">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-colors flex items-center justify-center gap-2">
<span>Skip Countdown</span>
<span class="material-symbols-outlined">fast_forward</span>
</button>
<button class="w-full mt-3 text-slate-500 dark:text-slate-400 font-medium py-2 rounded-xl">
                Cancel Brew
            </button>
</div>
<!-- Step Indicator (Dots) -->
<div class="flex justify-center gap-2 pb-8">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
</div>
</div>
</body></html>
